name: Generate Blog Index

on:
  push:
    paths:
      - "blogs/**.md" # Trigger when any Markdown file is added or modified in blogs directory
    branches:
      - main # Or your default branch name

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Generate blogs index.json
        run: |
          node .github/scripts/generate-blog-index.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add blogs/index.json
          git commit -m "Auto-generate blogs index.json" || echo "No changes to commit"
          git push
