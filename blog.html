    <!-- Font reset to ensure JetBrains Mono is used everywhere -->

    <!-- Inline font fix for blog content -->
    <style>
      /* Global blog font override */
      body {
        font-family: "jet-brains-mono", monospace;
      }

      /* Force font application on all relevant elements */
      .blog-container,
      .blog-container *,
      .blog-post-content,
      .blog-post-content * {
        font-family: "jet-brains-mono", monospace !important;
      }

      /* Explicit font for text elements */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      p,
      a,
      span,
      div,
      li,
      blockquote,
      time,
      code,
      pre {
        font-family: "jet-brains-mono", monospace !important;
      }
    </style>
